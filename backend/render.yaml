services:
  - type: web
    name: ai-doc-backend
    runtime: python
    plan: free

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: TOKENIZERS_PARALLELISM
        value: false

      - key: OMP_NUM_THREADS
        value: 1

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      uvicorn backend.main:app --host 0.0.0.0 --port $PORT