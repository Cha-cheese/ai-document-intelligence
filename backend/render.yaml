services:
  - type: web
    name: backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: OMP_NUM_THREADS
        value: 1
      - key: TOKENIZERS_PARALLELISM
        value: "false"